version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finmind_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finmind
      POSTGRES_PASSWORD: finmind123
      POSTGRES_DB: finmind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finmind_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finmind_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
